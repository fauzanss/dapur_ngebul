[build]
  command = "echo 'No build required'"
  functions = "netlify/functions"
  publish = "public"

[[redirects]]
  from = "/api/menu"
  to = "/.netlify/functions/menu"
  status = 200

[[redirects]]
  from = "/api/menu/*"
  to = "/.netlify/functions/menu"
  status = 200

[[redirects]]
  from = "/api/orders"
  to = "/.netlify/functions/orders"
  status = 200

[[redirects]]
  from = "/api/orders/*"
  to = "/.netlify/functions/orders"
  status = 200

[[redirects]]
  from = "/api/sales"
  to = "/.netlify/functions/sales"
  status = 200

[[redirects]]
  from = "/api/sales/*"
  to = "/.netlify/functions/sales"
  status = 200

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/health"
  status = 200

[build.environment]
  NODE_VERSION = "18"

