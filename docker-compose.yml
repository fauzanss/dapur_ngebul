services:
  db:
    image: mysql:8.0
    container_name: dapur_ngebul_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: dapur_ngebul
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    ports:
      - "3306:3306"
    healthcheck:
      test:
        ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - db_data:/var/lib/mysql

  api:
    image: php:8.2-cli
    container_name: dapur_ngebul_api
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./dapur-ngebul-server-php:/app
    environment:
      PORT: 4002
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: appuser
      DB_PASSWORD: apppass
      DB_NAME: dapur_ngebul
    command: sh -c "php -S 0.0.0.0:4002 -t ."
    ports:
      - "4002:4002"
    healthcheck:
      test: ["CMD", "php", "-r", "exit((bool)@file_get_contents('http://127.0.0.1:4002/api/health') ? 0 : 1);"]
      interval: 10s
      timeout: 3s
      retries: 15
      start_period: 10s
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: dapur_ngebul_frontend
    working_dir: /app
    depends_on:
      api:
        condition: service_healthy
    environment:
      CI: "1"
      EXPO_NO_TELEMETRY: "1"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./dapur-ngebul-client:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npx expo start --web --host 0.0.0.0 --port 8081 --non-interactive"
    ports:
      - "8081:8081"
    restart: unless-stopped

volumes:
  db_data:
    driver: local
  frontend_node_modules:
